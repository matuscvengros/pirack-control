services:
  pirack-control:
    image: ghcr.io/matuscvengros/pirack-control:latest
    container_name: pirack-control
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
    devices:
      - /dev/gpiomem:/dev/gpiomem
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
    restart: unless-stopped
